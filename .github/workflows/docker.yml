name: buildx

on:
  push:
    branches: main
    tags: 'v*'

jobs:
  buildx-dep:
    strategy:
      matrix:
        platform: ["amd64", "arm64"]
        dep: ["vkfft", "sigmf", "driver"]
        builder: ["ubuntu-latest", "ubuntu-24.04-arm"]
        exclude:
          - platform: "amd64"
            builder: "ubuntu-24.04-arm"
          - platform: "arm64"
            builder: "ubuntu-latest"
    runs-on: ${{ matrix.builder }}
    environment:
      name: "release"
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Get the version
      id: get_version
      run: echo ::set-output name=VERSION::$(echo $GITHUB_REF | cut -d / -f 3)
    - name: Change for main
      id: change_version
      run: if [ "${{ steps.get_version.outputs.VERSION }}" == "main" ]; then echo VERSION=latest >> $GITHUB_OUTPUT; else echo VERSION=${{ steps.get_version.outputs.VERSION }} >> $GITHUB_OUTPUT; fi
    - name: Change for platform
      id: change_platform
      run: if [ "${{ matrix.platform }}" == "arm64" ]; then echo MARCH=-march=armv8.2-a -mtune=cortex-a78 >> $GITHUB_OUTPUT; else echo MARCH=-march=native >> $GITHUB_OUTPUT ; fi
    - name: Set up qemu
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
      if: github.repository == 'anarkiwi/gamutrf-deps' && github.event_name == 'push'
    - name: Build and push platforms ${{ matrix.dep }}
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Dockerfile.${{ matrix.dep }}
        platforms: linux/${{ matrix.platform }}
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        tags: anarkiwi/gamutrf-${{ matrix.dep }}:${{ steps.change_version.outputs.VERSION }}-${{ matrix.platform }}
        build-args: |
          MARCH=${{ steps.change_platform.outputs.MARCH }}
      if: github.repository == 'anarkiwi/gamutrf-deps' && github.event_name == 'push'
  buildx-dep-manifest:
    needs: [buildx-dep]
    runs-on: ubuntu-latest
    environment:
      name: "release"
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Get the version
      id: get_version
      run: echo ::set-output name=VERSION::$(echo $GITHUB_REF | cut -d / -f 3)
    - name: Change for main
      id: change_version
      run: if [ "${{ steps.get_version.outputs.VERSION }}" == "main" ]; then echo VERSION=latest >> $GITHUB_OUTPUT; else echo VERSION=${{ steps.get_version.outputs.VERSION }} >> $GITHUB_OUTPUT; fi
    - name: Change for platform
      id: change_platform
      run: if [ "${{ matrix.platform }}" == "arm64" ]; then echo MARCH=-march=armv8.2-a -mtune=cortex-a78 >> $GITHUB_OUTPUT; else echo MARCH=-march=native >> $GITHUB_OUTPUT ; fi
    - name: Set up qemu
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
      if: github.repository == 'anarkiwi/gamutrf-deps' && github.event_name == 'push'
    - name: manifest workaround
      run: |
        docker buildx imagetools create -t anarkiwi/gamutrf-vkfft:${{ steps.change_version.outputs.VERSION }} \
        anarkiwi/gamutrf-vkfft:${{ steps.change_version.outputs.VERSION }}-arm64 \
        anarkiwi/gamutrf-vkfft:${{ steps.change_version.outputs.VERSION }}-amd64 && \
        docker buildx imagetools create -t anarkiwi/gamutrf-sigmf:${{ steps.change_version.outputs.VERSION }} \
        anarkiwi/gamutrf-sigmf:${{ steps.change_version.outputs.VERSION }}-arm64 \
        anarkiwi/gamutrf-sigmf:${{ steps.change_version.outputs.VERSION }}-amd64 && \
        docker buildx imagetools create -t anarkiwi/gamutrf-driver:${{ steps.change_version.outputs.VERSION }} \
        anarkiwi/gamutrf-driver:${{ steps.change_version.outputs.VERSION }}-arm64 \
        anarkiwi/gamutrf-driver:${{ steps.change_version.outputs.VERSION }}-amd64
      if: github.repository == 'anarkiwi/gamutrf-deps' && github.event_name == 'push'
